<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日锻炼 - Daily Exercise</title>
  <script>
    // 将路径转换为 hash 路由
    (function() {
      const base = '/daily-exercise/';
      const path = window.location.pathname;
      
      // 如果是根路径，直接重定向
      if (path === base || path === base + 'index.html') {
        return;
      }
      
      // 提取路径部分，转换为 hash
      const pathName = path.replace(base, '');
      if (pathName) {
        const hash = '#/' + pathName;
        window.location.replace(base + hash);
      }
    })();
  </script>
</head>
<body>
  <div style="display:flex;justify-content:center;align-items:center;height:100vh;flex-direction:column;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
    <h1 style="color:#667eea;margin-bottom:10px;">每日锻炼</h1>
    <p style="color:#7f8c8d;">正在加载...</p>
    <p style="color:#95a5a6;font-size:14px;margin-top:20px;">如果页面没有自动跳转，请<a href="https://chapoii.github.io/daily-exercise/#/" style="color:#667eea;">点击这里</a></p>
  </div>
</body>
</html>
